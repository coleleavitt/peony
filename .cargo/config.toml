[target.x86_64-unknown-linux-gnu]
linker = "/usr/bin/cc"
rustflags = [
    "-C", "linker-flavor=gcc",
    "-C", "link-self-contained=no",
    "-C", "target-cpu=native",
]

[profile.dev]
debug = "full"
split-debuginfo = "off"
strip = "none"

[profile.release]
debug = "full"
split-debuginfo = "off"
strip = "none"

[profile.unstripped]
debug = "full"
split-debuginfo = "off"
strip = "none"
