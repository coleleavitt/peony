name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: build · test · clippy · fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Build
        run: cargo build --workspace --release

      - name: Test
        run: cargo test --workspace

  proofs:
    name: rocq proofs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rocq/Coq
        run: |
          sudo apt-get update
          sudo apt-get install -y coq

      - name: Compile all proofs (green = no unproved goal)
        working-directory: rocq-tests
        run: make

  link-real-programs:
    name: link C/C++/Rust correctness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build peony
        run: cargo build --release -p peony

      - name: Link & run a real C, C++, and Rust program with peony
        run: |
          set -euxo pipefail
          PEONY="$PWD/target/release/peony"
          mkdir -p /tmp/B && ln -sf "$PEONY" /tmp/B/ld

          # C
          printf '#include <stdio.h>\nint main(){puts("ci-c");return 0;}\n' > /tmp/c.c
          cc -B/tmp/B /tmp/c.c -o /tmp/c.bin
          test "$(/tmp/c.bin)" = "ci-c"

          # C++ (iostream + exceptions + STL — the path that used to crash)
          cat > /tmp/x.cpp <<'EOF'
          #include <iostream>
          #include <vector>
          #include <stdexcept>
          int main(){ std::vector<int> v{1,2,3}; long s=0; for(int x:v) s+=x;
            try { if(s!=6) throw std::runtime_error("bad"); } catch(...) { return 2; }
            std::cout << "ci-cxx " << s << "\n"; return 0; }
          EOF
          c++ -B/tmp/B /tmp/x.cpp -o /tmp/x.bin
          test "$(/tmp/x.bin)" = "ci-cxx 6"

          # Rust
          mkdir -p /tmp/rci/src
          printf 'fn main(){println!("ci-rust");}\n' > /tmp/rci/src/main.rs
          printf '[package]\nname="rci"\nversion="0.0.0"\nedition="2021"\n' > /tmp/rci/Cargo.toml
          ( cd /tmp/rci && RUSTFLAGS="-C linker=/usr/bin/cc -C link-arg=-B/tmp/B" cargo run -q )
