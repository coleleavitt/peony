name: Benchmarks

on:
  push:
    branches: [master]
  pull_request:

jobs:
  codspeed:
    name: CodSpeed micro-benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-codspeed
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-codspeed

      - name: Build benchmarks
        run: cargo codspeed build -p peony-bench

      # Requires a CODSPEED_TOKEN repo secret (https://codspeed.io). Until set,
      # this step is a no-op-on-fork tripwire that catches build breakage of the
      # benches even without the token.
      - name: Run benchmarks
        uses: CodSpeedHQ/action@v3
        with:
          run: cargo codspeed run -p peony-bench
          token: ${{ secrets.CODSPEED_TOKEN }}
